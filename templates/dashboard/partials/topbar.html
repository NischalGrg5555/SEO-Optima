<header class="topbar">
  <div class="topbar-left">
    <button class="sidebar-toggle" id="sidebarToggle">
      <i class="bi bi-list"></i>
    </button>
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" placeholder="Type to search..." class="search-input">
    </div>
  </div>

  <div class="topbar-right">
    <!-- Notifications -->
    <button class="icon-button" data-bs-toggle="dropdown">
      <i class="bi bi-bell"></i>
      <span class="badge-dot"></span>
    </button>
    
    <!-- Messages -->
    <button class="icon-button" data-bs-toggle="dropdown">
      <i class="bi bi-chat-dots"></i>
    </button>

    <!-- User Menu -->
    <div class="user-menu" data-bs-toggle="dropdown">
      <div class="user-info">
        <span class="user-name">{{ request.user.get_full_name|default:request.user.username }}</span>
        <span class="user-role">SEO Analyst</span>
      </div>
      <div class="topbar-avatar" style="width: 40px; height: 40px; min-width: 40px; border-radius: 999px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #3B82F6, #2563EB); flex-shrink: 0;">
        {% if request.user.profile.profile_photo %}
        <img class="topbar-avatar-image" src="{{ request.user.profile.profile_photo.url }}" alt="{{ request.user.get_full_name|default:request.user.username }} profile photo" style="width: 40px; height: 40px; min-width: 40px; object-fit: cover; object-position: center; border-radius: 999px; display: block; flex-shrink: 0;">
        {% else %}
        <span class="topbar-avatar-fallback" style="width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; color: #ffffff; font-weight: 700; font-size: 16px; line-height: 1;">{{ request.user.first_name|slice:":1"|upper }}</span>
        {% endif %}
      </div>
      <i class="bi bi-chevron-down"></i>
    </div>
    
    <ul class="dropdown-menu dropdown-menu-end user-dropdown">
      <li>
        <a class="dropdown-item" href="{% url 'accounts:profile' %}">
          <i class="bi bi-person"></i> My Profile
        </a>
      </li>
      <li>
        <a class="dropdown-item" href="{% url 'accounts:settings' %}">
          <i class="bi bi-gear"></i> Settings
        </a>
      </li>
      <li><hr class="dropdown-divider"></li>
      <li>
        <a class="dropdown-item" href="{% url 'accounts:logout' %}">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
      </li>
    </ul>
  </div>
</header>
